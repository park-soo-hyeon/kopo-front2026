<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .wrap {
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: flex-start;
            background-color: gainsboro;
            width: 500px;
            height: 500px;
        }
        .wrap>div {
            color: white;
            line-height: 100px;
            text-align: center;
            font-size: 40px;
            width: 100px;
            height: 100px;
        }
        .blue {
            background-color: #4967d8;
        }
        .purple {
            background-color: blueviolet;
        }
        .green {
            background-color: green;
        }
    </style>

</head>
<body>
    <div class="wrap">
        <div class="blue">A</div>
        <div class="purple">B</div>
        <div class="green">C</div>
    </div>
</body>
</html>
